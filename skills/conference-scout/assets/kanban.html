<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦀</text></svg>">
<title>MyResearchClaw — {{ACTIVE_TOPIC}}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0c1118; --bg-card:#151c27; --bg-soft:#0f1520; --bg-header:#101722; --accent:#69a6ff;
  --accent2:#38d9c7; --accent3:#ff8d6b; --accent4:#ffd66e; --text:#edf3ff; --text-dim:#94a6c2;
  --text-muted:#687892; --border:rgba(255,255,255,0.08); --border-hover:rgba(105,166,255,0.28);
}
html, body { background:var(--bg); color:var(--text); min-height:100vh; font-family:'Noto Sans SC',sans-serif; }
body {
  background:
    radial-gradient(circle at top right, rgba(105,166,255,0.14), transparent 24%),
    radial-gradient(circle at top left, rgba(56,217,199,0.08), transparent 20%),
    var(--bg);
}
body.light {
  --bg:#f4f7fb; --bg-card:#ffffff; --bg-soft:#eef3f8; --bg-header:#edf2f8; --accent:#2364d2;
  --accent2:#0f9f90; --accent3:#d66033; --accent4:#b98911; --text:#18202c; --text-dim:#425469;
  --text-muted:#66768c; --border:rgba(15,23,42,0.10); --border-hover:rgba(35,100,210,0.22);
}
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-thumb { background:rgba(105,166,255,0.35); border-radius:99px; }
.page-wrap { max-width:1440px; margin:0 auto; padding:24px 28px 80px; }
.theme-toggle {
  position:fixed; top:16px; right:16px; z-index:9999; width:40px; height:40px; border-radius:50%;
  border:1px solid var(--border); background:var(--bg-card); color:var(--text); cursor:pointer; font-size:16px;
}
.server-banner {
  background:rgba(255,141,107,0.08); border:1px solid rgba(255,141,107,0.16);
  padding:10px 16px; border-radius:14px; font:12px 'JetBrains Mono', monospace; color:var(--accent3);
  margin-bottom:18px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;
}
.server-banner code {
  background:rgba(255,141,107,0.1); border:1px solid rgba(255,141,107,0.18);
  padding:2px 8px; border-radius:8px;
}
.hero {
  border:1px solid var(--border); border-radius:28px; padding:30px 32px;
  background:linear-gradient(145deg, rgba(105,166,255,0.14), rgba(56,217,199,0.04));
  margin-bottom:24px;
}
.hero-top { display:flex; justify-content:space-between; gap:16px; align-items:start; }
.hero-eyebrow { font:600 12px 'JetBrains Mono', monospace; color:var(--accent4); text-transform:uppercase; letter-spacing:.14em; margin-bottom:12px; }
.hero-title { font-size:48px; line-height:1.04; font-weight:900; max-width:980px; }
.hero-subtitle { margin-top:14px; color:var(--text-muted); font:500 12px 'JetBrains Mono', monospace; }
.hero-actions { display:flex; gap:10px; flex-wrap:wrap; }
.hero-btn, .btn {
  display:inline-flex; align-items:center; gap:6px; cursor:pointer; text-decoration:none;
  border:1px solid var(--border); border-radius:999px; padding:10px 14px; font-size:13px;
  color:var(--text); background:rgba(255,255,255,0.04); transition:all .15s;
}
.hero-btn:hover, .btn:hover { border-color:var(--border-hover); transform:translateY(-1px); }
.hero-btn.engineering { background:rgba(56,217,199,0.08); color:var(--accent2); border-color:rgba(56,217,199,0.18); }
.papers-grid { display:grid; grid-template-columns:1fr; gap:18px; }
.paper-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:22px; padding:22px 24px;
  transition:border-color .15s, transform .15s; display:flex; flex-direction:column;
}
.paper-card:hover { border-color:var(--border-hover); transform:translateY(-1px); }
.paper-card.is-arxiv { border-left:4px solid #d69e2e; }
.paper-card.is-confirmed { border-left:4px solid var(--accent); }
.paper-card.is-reading { border-left:4px solid var(--accent4); }
.paper-card.is-done { border-left:4px solid var(--accent2); }
.card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px; }
.card-title { font-size:20px; font-weight:800; line-height:1.42; flex:1; }
.card-title a { color:inherit; text-decoration:none; }
.card-title a:hover { color:var(--accent); }
.citations { font:700 12px 'JetBrains Mono', monospace; padding:5px 10px; border-radius:999px; white-space:nowrap; }
.cite-high { color:var(--accent2); background:rgba(56,217,199,0.1); border:1px solid rgba(56,217,199,0.18); }
.cite-mid { color:#c0b6ff; background:rgba(162,155,254,0.12); border:1px solid rgba(162,155,254,0.2); }
.cite-low, .cite-none { color:var(--text-muted); background:rgba(255,255,255,0.04); border:1px solid var(--border); }
.card-authors { font-size:13px; color:var(--text-muted); margin-bottom:12px; }
.card-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.venue-badge { font-size:11px; padding:4px 10px; border-radius:999px; font-weight:700; color:var(--accent); border:1px solid rgba(105,166,255,0.24); background:rgba(105,166,255,0.1); }
.venue-badge.arxiv { color:#f7c978; border-color:rgba(247,201,120,0.24); background:rgba(247,201,120,0.1); }
.card-tag { font-size:11px; padding:3px 8px; border-radius:999px; border:1px solid; font-weight:500; }
.tag-cyan { color:var(--accent2); border-color:rgba(56,217,199,0.18); background:rgba(56,217,199,0.06); }
.tag-purple { color:#c0b6ff; border-color:rgba(162,155,254,0.18); background:rgba(162,155,254,0.06); }
.tag-pink { color:#ff9ac2; border-color:rgba(255,154,194,0.18); background:rgba(255,154,194,0.06); }
.summary-block { border-top:1px solid var(--border); padding-top:14px; margin-bottom:14px; }
.summary-label { font:600 10px 'JetBrains Mono', monospace; color:var(--text-muted); margin-bottom:6px; letter-spacing:.08em; text-transform:uppercase; }
.summary-en, .summary-zh { font-size:14px; line-height:1.82; }
.summary-en { color:var(--text-dim); margin-bottom:12px; }
.summary-zh { color:#c8d5e8; border-left:3px solid rgba(105,166,255,0.28); padding-left:12px; }
.progress-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.progress-track { flex:1; height:6px; border-radius:999px; overflow:hidden; background:rgba(255,255,255,0.06); }
.progress-fill { height:100%; width:0%; background:linear-gradient(90deg, var(--accent), #94b8ff); transition:width 1.1s ease; }
.progress-fill.active { background:linear-gradient(90deg, var(--accent4), var(--accent)); animation:progPulse 1.8s ease-in-out infinite; }
.progress-fill.done { background:var(--accent2); animation:none; }
.progress-label { font:500 11px 'JetBrains Mono', monospace; color:var(--text-muted); min-width:115px; text-align:right; }
.progress-label.done { color:var(--accent2); }
@keyframes progPulse { 0%,100% { opacity:1; } 50% { opacity:.55; } }
.card-actions { display:flex; gap:10px; flex-wrap:wrap; }
.btn-view { color:var(--accent); background:rgba(105,166,255,0.08); border-color:rgba(105,166,255,0.18); }
.btn-read { color:#c0b6ff; background:rgba(162,155,254,0.08); border-color:rgba(162,155,254,0.18); }
.btn-read.reading { color:var(--accent4); background:rgba(255,214,110,0.08); border-color:rgba(255,214,110,0.18); }
.btn-done, .btn-notes { color:var(--accent2); background:rgba(56,217,199,0.08); border-color:rgba(56,217,199,0.18); }
.notes-shell { display:grid; grid-template-columns:minmax(0, 0.98fr) minmax(380px, 0.92fr); gap:18px; align-items:start; }
.notes-pane, .pdf-pane {
  background:var(--bg-card); border:1px solid var(--border); border-radius:22px; min-height:72vh;
}
.notes-pane { padding:24px 26px 36px; }
.notes-topbar {
  display:flex; justify-content:space-between; align-items:flex-start; gap:16px;
  padding-bottom:18px; margin-bottom:18px; border-bottom:1px solid var(--border);
}
.notes-title-wrap { display:flex; flex-direction:column; gap:6px; }
.notes-kicker { font:600 11px 'JetBrains Mono', monospace; color:var(--accent4); text-transform:uppercase; letter-spacing:.12em; }
.notes-title { font-size:22px; line-height:1.35; font-weight:800; }
.notes-subtitle { color:var(--text-muted); font-size:13px; }
.notes-content { font-size:15px; line-height:1.9; color:var(--text-dim); }
.notes-content h1 { font-size:28px; font-weight:900; margin:28px 0 16px; color:var(--text); }
.notes-content h2 { font-size:20px; font-weight:800; color:var(--accent); margin:26px 0 12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.notes-content h3 { font-size:16px; font-weight:800; color:#bfd1f7; margin:18px 0 8px; }
.notes-content h4 { font-size:14px; font-weight:700; color:var(--text); margin:14px 0 6px; }
.notes-content p { margin:12px 0; }
.notes-content strong { color:var(--text); }
.notes-content code { background:rgba(255,255,255,0.06); border:1px solid var(--border); padding:2px 6px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:13px; }
.notes-content pre { background:var(--bg-soft); border:1px solid var(--border); border-radius:14px; padding:16px; overflow:auto; margin:16px 0; }
.notes-content pre code { background:none; border:none; padding:0; }
.notes-content table { width:100%; border-collapse:collapse; margin:18px 0; font-size:14px; }
.notes-content th, .notes-content td { border:1px solid var(--border); padding:10px 12px; text-align:left; }
.notes-content th { background:rgba(105,166,255,0.08); color:var(--accent); }
.notes-content blockquote { border-left:3px solid var(--accent); background:rgba(105,166,255,0.05); color:var(--text-muted); margin:16px 0; padding:10px 14px; border-radius:0 10px 10px 0; }
.notes-content ul, .notes-content ol { padding-left:24px; margin:12px 0; }
.pdf-pane { display:flex; flex-direction:column; overflow:hidden; }
.pdf-topbar {
  padding:18px 18px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:12px;
}
.pdf-title { font-size:15px; font-weight:800; }
.pdf-links { display:flex; gap:8px; flex-wrap:wrap; }
.pdf-body { display:grid; grid-template-columns:120px minmax(0, 1fr); min-height:0; flex:1; }
.pdf-thumbs {
  border-right:1px solid var(--border); overflow:auto; padding:12px; display:flex; flex-direction:column; gap:10px;
  background:rgba(255,255,255,0.02); cursor:grab; user-select:none;
}
.pdf-thumbs.dragging { cursor:grabbing; }
.thumb-card { border:1px solid var(--border); border-radius:12px; padding:8px; background:var(--bg-soft); }
.thumb-card.active { border-color:rgba(105,166,255,0.42); box-shadow:0 0 0 1px rgba(105,166,255,0.24) inset; }
.thumb-card canvas { width:100%; display:block; border-radius:8px; background:#fff; }
.thumb-label { font:500 11px 'JetBrains Mono', monospace; color:var(--text-muted); text-align:center; margin-top:6px; }
.pdf-viewer { position:relative; min-height:70vh; background:#0a0f16; }
.pdf-frame { width:100%; height:100%; min-height:70vh; border:0; background:#0a0f16; }
.pdf-empty {
  padding:24px; color:var(--text-dim); line-height:1.8; display:flex; align-items:center; justify-content:center; min-height:70vh;
}
.toast {
  position:fixed; bottom:24px; right:24px; z-index:9999; max-width:520px; display:none;
  border:1px solid rgba(162,155,254,0.35); border-radius:16px; background:#1b2230; padding:16px 18px; box-shadow:0 12px 42px rgba(0,0,0,0.38);
}
.toast.show { display:block; }
.toast-title { font:600 11px 'JetBrains Mono', monospace; color:var(--text-muted); margin-bottom:8px; }
.toast-cmd { font:500 13px 'JetBrains Mono', monospace; background:rgba(255,255,255,0.06); padding:10px 12px; border-radius:10px; color:#fff; word-break:break-word; }
.kanban-footer {
  margin-top:34px; padding-top:18px; border-top:1px solid var(--border); display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;
  font:500 11px 'JetBrains Mono', monospace; color:var(--text-muted);
}
@media (max-width: 1100px) {
  .hero-title { font-size:38px; }
  .notes-shell { grid-template-columns:1fr; }
  .pdf-body { grid-template-columns:96px minmax(0, 1fr); }
}
@media (max-width: 720px) {
  .page-wrap { padding:16px 16px 60px; }
  .hero { padding:22px 20px; }
  .hero-top { flex-direction:column; }
  .hero-title { font-size:30px; }
  .pdf-body { grid-template-columns:1fr; }
  .pdf-thumbs { flex-direction:row; border-right:none; border-bottom:1px solid var(--border); overflow:auto hidden; }
  .thumb-card { min-width:88px; }
}
</style>
</head>
<body>
<div class="page-wrap">
  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  <div id="server-banner" class="server-banner" style="display:none">
    本地自动精读服务未连接。启动 <code>python serve.py</code> 后可直接在页面中触发 `paper-reader`。
  </div>

  <section class="hero">
    <div class="hero-top">
      <div>
        <div class="hero-eyebrow">Research Theme</div>
        <h1 class="hero-title">{{ACTIVE_TOPIC}}</h1>
        <div class="hero-subtitle">Updated {{LAST_UPDATED}}</div>
      </div>
      <div class="hero-actions">
        <button class="hero-btn engineering" onclick="openEngineeringView()">Engineering View →</button>
      </div>
    </div>
  </section>

  <div id="papers-view">
    <div class="papers-grid">
      {{ALL_PAPERS}}
    </div>
  </div>

  <div id="notes-view" style="display:none">
    <div class="notes-shell">
      <section class="notes-pane">
        <div class="notes-topbar">
          <div class="notes-title-wrap">
            <div class="notes-kicker">Paper Reader</div>
            <div id="notes-title" class="notes-title"></div>
            <div id="notes-subtitle" class="notes-subtitle"></div>
          </div>
          <button class="btn" onclick="navigateTo('papers')">← Back to Papers</button>
        </div>
        <div id="notes-content" class="notes-content"></div>
      </section>

      <aside class="pdf-pane">
        <div class="pdf-topbar">
          <div class="pdf-title">Paper PDF</div>
          <div class="pdf-links">
            <a id="pdf-open-link" class="btn btn-view" href="#" target="_blank" style="display:none">Open PDF ↗</a>
            <a id="paper-open-link" class="btn btn-view" href="#" target="_blank" style="display:none">Open Paper ↗</a>
          </div>
        </div>
        <div class="pdf-body">
          <div id="pdf-thumbs" class="pdf-thumbs"></div>
          <div class="pdf-viewer">
            <iframe id="pdf-frame" class="pdf-frame" title="Paper PDF Viewer"></iframe>
            <div id="pdf-empty" class="pdf-empty">当前没有可直接预览的 PDF。若论文页面可访问，右上角可直接打开原文。</div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-title">Paste into Codex</div>
    <div class="toast-cmd" id="toast-cmd"></div>
  </div>

  <footer class="kanban-footer">
    <span>Powered by MyResearchClaw</span>
    <span>{{LAST_UPDATED}}</span>
  </footer>
</div>

<script>
const API = 'http://localhost:5678';
let serverOk = false;
let activeReadId = null;
let pollInterval = null;
let currentPdfUrl = '';
let currentPaperUrl = '';

if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

async function init() {
  applyTheme();
  await checkServer();
  renderRoute();
  window.addEventListener('hashchange', renderRoute);
  setupThumbDrag();
}

async function openEngineeringView() {
  if (serverOk) {
    try {
      await fetch(`${API}/api/generate-engineering`, { method: 'POST' });
    } catch {}
  }
  location.href = '{{ENGINEERING_LINK}}';
}

async function checkServer() {
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 1500);
    const r = await fetch(`${API}/api/papers`, { signal: ctrl.signal });
    serverOk = r.ok;
  } catch {
    serverOk = false;
  }
  document.getElementById('server-banner').style.display = serverOk ? 'none' : 'flex';
  if (serverOk) startPolling();
}

function startPolling() {
  if (pollInterval) return;
  pollInterval = setInterval(async () => {
    try {
      const r = await fetch(`${API}/api/papers`);
      if (!r.ok) return;
      const data = await r.json();
      data.papers.forEach(updateCard);
    } catch {}
  }, 3000);
}

function updateCard(p) {
  const card = document.querySelector(`[data-id="${p.id}"]`);
  if (!card) return;
  const prog = p.progress || 0;
  const fill = card.querySelector('.progress-fill');
  if (fill) {
    fill.style.width = prog + '%';
    fill.className = 'progress-fill' + (prog >= 100 ? ' done' : prog > 0 ? ' active' : '');
  }
  const lbl = card.querySelector('.progress-label');
  if (lbl) {
    if (prog >= 100) { lbl.textContent = '✓ Complete'; lbl.className = 'progress-label done'; }
    else if (prog > 0) { lbl.textContent = `Reading... ${prog}%`; lbl.className = 'progress-label'; }
    else { lbl.textContent = ''; lbl.className = 'progress-label'; }
  }

  const btn = card.querySelector('[data-role="read-btn"]');
  if (btn) {
    if (prog >= 100) {
      btn.disabled = false;
      btn.textContent = '📄 View Notes';
      btn.className = 'btn btn-notes';
      btn.onclick = () => navigateTo('notes', p.id);
    } else if (prog > 0) {
      btn.disabled = true;
      btn.textContent = '⏳ Reading...';
      btn.className = 'btn btn-read reading';
    } else {
      btn.disabled = false;
      btn.textContent = '📖 Read Paper';
      btn.className = 'btn btn-read';
      const url = card.getAttribute('data-url');
      const title = card.querySelector('.card-title').textContent.trim();
      btn.onclick = () => triggerRead(p.id, url, title);
    }
  }

  if (p.note_path) card.setAttribute('data-note-path', p.note_path);
  if (p.pdf_local_path) card.setAttribute('data-pdf-url', `${API}/api/pdf/${encodeURIComponent(p.id)}`);
  else if (p.pdf_url) card.setAttribute('data-pdf-url', p.pdf_url);

  if (prog >= 100 && p.id === activeReadId) {
    activeReadId = null;
    setTimeout(() => navigateTo('notes', p.id), 800);
  }
}

async function triggerRead(id, url, title) {
  if (!serverOk) { showToast(url); return; }
  activeReadId = id;
  const card = document.querySelector(`[data-id="${id}"]`);
  const btn = card.querySelector('[data-role="read-btn"]');
  btn.disabled = true;
  btn.textContent = '⏳ Starting...';
  btn.className = 'btn btn-read reading';

  try {
    const r = await fetch(`${API}/api/read-paper`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, paper_id: id, title })
    });
    if (!r.ok) throw new Error('Server returned ' + r.status);
  } catch (e) {
    activeReadId = null;
    btn.disabled = false;
    btn.textContent = '📖 Read Paper';
    btn.className = 'btn btn-read';
    btn.onclick = () => triggerRead(id, url, title);
    showToast(url);
  }
}

function renderRoute() {
  const hash = location.hash;
  if (hash.startsWith('#notes/')) showNotes(decodeURIComponent(hash.slice(7)));
  else showPapers();
}

function navigateTo(page, id) {
  if (page === 'notes') location.hash = '#notes/' + encodeURIComponent(id);
  else {
    history.pushState('', document.title, window.location.pathname + window.location.search);
    renderRoute();
  }
}

function showPapers() {
  document.getElementById('papers-view').style.display = '';
  document.getElementById('notes-view').style.display = 'none';
}

async function showNotes(paperId) {
  document.getElementById('papers-view').style.display = 'none';
  document.getElementById('notes-view').style.display = '';
  const card = document.querySelector(`[data-id="${paperId}"]`);
  const title = card ? card.querySelector('.card-title a').textContent.trim() : paperId;
  const subtitle = card ? `${card.querySelector('.card-authors')?.textContent || ''}` : '';
  document.getElementById('notes-title').textContent = title;
  document.getElementById('notes-subtitle').textContent = subtitle;

  const content = document.getElementById('notes-content');
  content.innerHTML = '<p style="color:var(--text-muted)">Loading notes...</p>';

  try {
    const r = await fetch(`${API}/api/notes/${paperId}`);
    if (!r.ok) throw new Error('not-ready');
    const md = await r.text();
    content.innerHTML = renderMd(md);
    const resources = extractPaperResources(md, card?.getAttribute('data-url') || '', card?.getAttribute('data-pdf-url') || '');
    currentPdfUrl = resources.pdfUrl;
    currentPaperUrl = resources.paperUrl;
    await showPdfPanel(resources.pdfUrl, resources.paperUrl);
  } catch {
    content.innerHTML = `<p style="color:var(--accent3)">Notes not ready yet. Please wait for reading to complete.</p>`;
    await showPdfPanel(card?.getAttribute('data-pdf-url') || '', card?.getAttribute('data-url') || '');
  }
}

function renderMd(md) {
  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks:true, gfm:true });
    return marked.parse(md);
  }
  return '<pre style="white-space:pre-wrap">' + md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre>';
}

function extractPaperResources(md, fallbackPaperUrl, presetPdfUrl) {
  let pdfUrl = presetPdfUrl || '';
  let paperUrl = fallbackPaperUrl || '';
  const lines = md.split('\n');
  for (const line of lines) {
    const match = line.match(/-\s*(Paper|论文)\s*:\s*(https?:\/\/\S+)/i);
    if (match && !paperUrl) paperUrl = match[2];
    const pdfMatch = line.match(/-\s*(PDF|PDF mirror)\s*:\s*(https?:\/\/\S+)/i);
    if (pdfMatch && !pdfUrl) pdfUrl = pdfMatch[2];
  }
  if (!pdfUrl && paperUrl.includes('arxiv.org/abs/')) pdfUrl = paperUrl.replace('/abs/', '/pdf/') + '.pdf';
  if (!pdfUrl && paperUrl.includes('arxiv.org/pdf/')) pdfUrl = paperUrl.endsWith('.pdf') ? paperUrl : `${paperUrl}.pdf`;
  return { pdfUrl, paperUrl };
}

async function showPdfPanel(pdfUrl, paperUrl) {
  const frame = document.getElementById('pdf-frame');
  const empty = document.getElementById('pdf-empty');
  const thumbs = document.getElementById('pdf-thumbs');
  const pdfLink = document.getElementById('pdf-open-link');
  const paperLink = document.getElementById('paper-open-link');

  thumbs.innerHTML = '';
  frame.style.display = 'none';
  empty.style.display = 'flex';

  if (paperUrl) {
    paperLink.href = paperUrl;
    paperLink.style.display = 'inline-flex';
  } else paperLink.style.display = 'none';

  if (!pdfUrl) {
    pdfLink.style.display = 'none';
    empty.textContent = '当前还没有可预览的本地 PDF。服务端会优先尝试下载并缓存 PDF；如果失败，再使用右上角按钮打开论文原页面。';
    return;
  }

  pdfLink.href = pdfUrl;
  pdfLink.style.display = 'inline-flex';
  empty.textContent = 'PDF 正在加载中...';
  empty.style.display = 'flex';
  frame.src = pdfUrl + '#toolbar=1&navpanes=0&view=FitH';
  frame.style.display = 'block';
  empty.style.display = 'none';

  if (!window.pdfjsLib) return;
  try {
    const loadingTask = pdfjsLib.getDocument(pdfUrl);
    const pdf = await loadingTask.promise;
    const maxThumbs = Math.min(pdf.numPages, 12);
    for (let pageNum = 1; pageNum <= maxThumbs; pageNum++) {
      const page = await pdf.getPage(pageNum);
      const viewport = page.getViewport({ scale: 0.22 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const context = canvas.getContext('2d');
      await page.render({ canvasContext: context, viewport }).promise;

      const card = document.createElement('button');
      card.className = 'thumb-card' + (pageNum === 1 ? ' active' : '');
      card.type = 'button';
      card.innerHTML = `<div></div><div class="thumb-label">P.${pageNum}</div>`;
      card.firstChild.replaceWith(canvas);
      card.onclick = () => jumpToPdfPage(pdfUrl, pageNum, card);
      thumbs.appendChild(card);
    }
  } catch (err) {
    thumbs.innerHTML = '<div class="thumb-label">PDF 缩略图加载失败</div>';
  }
}

function jumpToPdfPage(pdfUrl, pageNum, activeCard) {
  const frame = document.getElementById('pdf-frame');
  frame.src = `${pdfUrl}#page=${pageNum}&view=FitH`;
  document.querySelectorAll('.thumb-card').forEach(el => el.classList.remove('active'));
  if (activeCard) activeCard.classList.add('active');
}

function setupThumbDrag() {
  const thumbs = document.getElementById('pdf-thumbs');
  let dragging = false;
  let startY = 0;
  let startScroll = 0;
  thumbs.addEventListener('mousedown', e => {
    dragging = true;
    thumbs.classList.add('dragging');
    startY = e.clientY;
    startScroll = thumbs.scrollTop;
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    thumbs.classList.remove('dragging');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    thumbs.scrollTop = startScroll - (e.clientY - startY);
  });
}

function showToast(url) {
  const cmd = `Use paper-reader to read this paper: ${url}`;
  document.getElementById('toast-cmd').textContent = cmd;
  document.getElementById('toast').classList.add('show');
  navigator.clipboard.writeText(cmd).catch(() => {});
}

function applyTheme() {
  const light = localStorage.getItem('theme') === 'light';
  document.body.classList.toggle('light', light);
  document.querySelector('.theme-toggle').textContent = light ? '☀️' : '🌙';
}

function toggleTheme() {
  const light = !document.body.classList.contains('light');
  localStorage.setItem('theme', light ? 'light' : 'dark');
  applyTheme();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('toast').classList.remove('show');
});

window.addEventListener('load', init);
</script>
